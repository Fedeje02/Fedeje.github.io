<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BCSchool Carrello — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="adminEs30.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <a href="login.html" class="logo">🛒 BC<span>School</span></a>
    <div class="header-right">
      <span class="user-info" id="header-username">—</span>
      <span class="role-badge admin">Admin</span>
      <button class="btn btn-logout" onclick="logout()">Esci</button>
    </div>
  </header>

  <main class="container">

    <!-- ===== ADD PRODUCT FORM ===== -->
    <section class="add-section">
      <h2 class="section-title">➕ Aggiungi prodotto</h2>
      <p class="section-sub">Inserisci i dettagli del prodotto da aggiungere al carrello.</p>

      <div id="form-alert" class="alert" style="display:none;"></div>

      <div class="form-row" id="product-form">
        <div class="input-group">
          <label for="inp-name">Nome articolo</label>
          <input type="text" id="inp-name" placeholder="es. Penna a sfera" />
        </div>
        <div class="input-group" style="max-width:160px;">
          <label for="inp-price">Prezzo (€)</label>
          <input type="number" id="inp-price" placeholder="0.00" step="0.01" min="0" />
        </div>
        <div class="input-group">
          <label for="inp-img">URL immagine</label>
          <input type="url" id="inp-img" placeholder="https://..." />
        </div>
        <div class="input-group" style="min-width:unset; flex:0;">
          <label>&nbsp;</label>
          <button class="btn btn-primary" id="btn-add" onclick="addProduct()">
            <span id="btn-add-text">Aggiungi</span>
            <span id="btn-add-spinner" style="display:none;"><span class="spinner"></span></span>
          </button>
        </div>
      </div>
    </section>

    <hr class="section-divider" />

    <!-- ===== CART ===== -->
    <section class="cart-section">
      <div class="cart-header">
        <h2 class="section-title">🛍️ Prodotti nel carrello</h2>
        <span class="count-badge" id="product-count">0 prodotti</span>
      </div>

      <!-- Search with debounce -->
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Cerca prodotto..." oninput="debouncedSearch(this.value)" />
      </div>

      <!-- Grid -->
      <div class="products-grid" id="products-grid">
        <div class="empty-state" id="empty-state">
          <div class="icon">🛒</div>
          <p>Nessun prodotto nel carrello.<br/>Aggiungi il primo prodotto qui sopra.</p>
        </div>
      </div>
    </section>

    <!-- ===== TOTAL BAR ===== -->
    <div class="total-bar">
      <p class="total-label">Totale: <span id="total-display">0.00 €</span></p>
      <button class="btn btn-primary" onclick="confirmCart()">✅ Conferma carrello</button>
    </div>

  </main>

  <!-- ===== SUMMARY OVERLAY ===== -->
  <div class="summary-overlay" id="summary-overlay" style="display:none;" onclick="closeSummaryOutside(event)">
    <div class="summary-box">
      <h3>📋 Riepilogo prodotti</h3>
      <ul class="summary-list" id="summary-list"></ul>
      <p class="summary-total" id="summary-total"></p>
      <div class="summary-actions">
        <button class="btn btn-ghost" onclick="closeSummary()">Continua ad aggiungere</button>
        <button class="btn btn-primary" onclick="closeSummary()">OK</button>
      </div>
    </div>
  </div>

  <script src="cart.js"></script>
  <script src="adminEs30.js"></script>
</body>
</html>
