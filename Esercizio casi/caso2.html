<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caso 2 - Tabella Responsive</title>
    <link rel="stylesheet" href="caso2.css">
</head>
<body>

    <div class="contenitore">
        <h2>Prezzi Alimenti</h2>
        <table>
            <thead>
                <tr>
                    <th>Prodotto</th>
                    <th>Categoria</th>
                    <th>Prezzo</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td data-label="Prodotto">Pane integrale</td>
                    <td data-label="Categoria">Panetteria</td>
                    <td data-label="Prezzo">€2,50</td>
                </tr>
                <tr>
                    <td data-label="Prodotto">Mozzarella di bufala</td>
                    <td data-label="Categoria">Latticini</td>
                    <td data-label="Prezzo">€4,80</td>
                </tr>
                <tr>
                    <td data-label="Prodotto">Mele Fuji</td>
                    <td data-label="Categoria">Frutta</td>
                    <td data-label="Prezzo">€3,20/kg</td>
                </tr>
                <tr>
                    <td data-label="Prodotto">Riso basmati</td>
                    <td data-label="Categoria">Cereali</td>
                    <td data-label="Prezzo">€2,90/kg</td>
                </tr>
                <tr>
                    <td data-label="Prodotto">Salmone affumicato</td>
                    <td data-label="Categoria">Pesce</td>
                    <td data-label="Prezzo">€6,50</td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
